name: super_fitness
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.5.4


dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.14
  get_it: ^8.0.2
  injectable: ^2.5.0
  intl: any
  json_annotation: ^4.9.0
  lottie: ^3.1.3
  meta: ^1.15.0
  mockito: ^5.4.4
  motion_toast: ^2.11.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.4.1
  shared_preferences: ^2.3.3
  skeletonizer: ^1.4.2
  test: ^1.25.7
  flutter_local_notifications: ^18.0.1
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.3.6
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  bloc_test: ^10.0.0
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  percent_indicator: ^4.2.4
  google_fonts:
  wheel_slider: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  lints: ^5.0.0
  retrofit_generator: ^9.1.4
  flutter_launcher_icons: "^0.14.3"
flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/images/logo_icon.png"
    min_sdk_android: 21
flutter:
  generate: true
  uses-material-design: true
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.


  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
     - family: BalooThambi800
       fonts:
         - asset: assets/fonts/BalooThambi2-ExtraBold.ttf
           weight: 800

     - family: BalooThambi400
       fonts:
         - asset: assets/fonts/BalooThambi2-Regular.ttf
           weight: 400
  
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
  assets:
    - assets/
    - assets/fonts/
    - assets/images/

