name: super_fitness
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.5.4


dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.14
  get_it: ^8.0.2
  injectable: ^2.5.0
  intl: any
  json_annotation: ^4.9.0
  lottie: ^3.1.3
  meta: ^1.15.0
